name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --locked || cargo build --workspace

      - name: Test
        run: cargo test --workspace

  determinism:
    name: scores are reproducible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Same input → byte-identical leaderboard, twice
        run: |
          cargo run -q -p sharpebench -- score suites/example_submissions.json > a.txt
          cargo run -q -p sharpebench -- score suites/example_submissions.json > b.txt
          diff a.txt b.txt && echo "deterministic ✓"

  audit:
    name: benchmark self-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: The scorer resists every known gaming attack
        run: cargo run -q -p sharpebench -- audit

  realism:
    name: frozen datasets behave like markets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: The scoring data exhibits Cont's stylized facts
        run: |
          cargo run -q -p sharpebench -- realism --data data/us-indices-1d.csv
          cargo run -q -p sharpebench -- realism --data data/crypto-majors-1d.csv

  supply-chain:
    name: cargo-deny (licenses · advisories · bans · sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build the book
        run: mdbook build docs/book
