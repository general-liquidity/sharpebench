name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pin the action to the same channel rust-toolchain.toml selects. With @stable the
      # runner downloads stable and installs the components onto it, then rustup redirects
      # cargo to 1.96.0 anyway, so the components land on a toolchain nothing runs.
      - name: Install Rust (matching rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --locked || cargo build --workspace

      - name: Test
        run: cargo test --workspace

  python:
    name: sharpebench-py (fmt, clippy, maturin, pytest)
    runs-on: ubuntu-latest
    # crates/sharpebench-py is `exclude`d from the workspace (pyo3 needs a Python
    # interpreter at build time), so the `check` job above never sees it: root
    # `cargo fmt --all` / `cargo clippy --all-targets` resolve against workspace
    # members only. Without this job a broken binding is first discovered by the
    # release workflow at publish time. Every command here runs from inside the
    # crate directory, which is the only way to reach an excluded crate.
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.96.0 (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Format
        working-directory: crates/sharpebench-py
        run: cargo fmt -- --check

      - name: Clippy (deny warnings)
        working-directory: crates/sharpebench-py
        run: cargo clippy --all-targets -- -D warnings

      - name: maturin develop + pytest (in a venv)
        working-directory: crates/sharpebench-py
        # maturin refuses to install without an active virtualenv ("Couldn't find a
        # virtualenv or conda environment"), hence the venv rather than a bare pip.
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip maturin pytest numpy
          maturin develop
          python -m pytest tests -q

  determinism:
    name: scores are reproducible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - name: Same input → byte-identical leaderboard, twice
        run: |
          cargo run -q -p sharpebench -- score suites/example_submissions.json > a.txt
          cargo run -q -p sharpebench -- score suites/example_submissions.json > b.txt
          diff a.txt b.txt && echo "deterministic ✓"

  audit:
    name: benchmark self-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - name: The scorer resists every known gaming attack
        run: cargo run -q -p sharpebench -- audit

  realism:
    name: frozen datasets behave like markets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - name: The scoring data exhibits Cont's stylized facts
        run: |
          cargo run -q -p sharpebench -- realism --data data/us-indices-1d.csv
          cargo run -q -p sharpebench -- realism --data data/crypto-majors-1d.csv

  supply-chain:
    name: cargo-deny (licenses · advisories · bans · sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build the book
        run: mdbook build docs/book
