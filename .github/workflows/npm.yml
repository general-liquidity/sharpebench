name: npm

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build-test:
    name: build wasm + npm package + MCP server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (pinned via rust-toolchain.toml) + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build the WASM kernel
        run: wasm-pack build crates/sharpebench-wasm --target nodejs --out-dir ../../npm/pkg --out-name sharpebench

      - name: Build + test the npm package
        working-directory: npm
        run: |
          npm install
          npm run build
          npm test

      - name: Build + test the MCP server
        working-directory: npm/mcp
        run: |
          # The MCP server depends on @general-liquidity/sharpebench, but a feature here can
          # reference an export (or a version) not yet on the registry. Point the dep at the
          # locally-built sibling for CI so it tests this commit, not the published copy.
          # Ephemeral — runner only, never committed. At release time the sibling is published
          # first, so release.yml's own mcp step resolves it from the registry normally.
          npm pkg set "dependencies.@general-liquidity/sharpebench=file:../"
          npm install
          npm run build
          npm test
