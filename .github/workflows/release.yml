name: Release

# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to build a signed-by-
# checksum static binary and verify the scoring kernel is crates.io-publishable.
# Real `cargo publish` is intentionally NOT run here — it needs a maintainer's
# CARGO_REGISTRY_TOKEN; publish manually once this workflow is green.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binary:
    name: static binary (musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build the static release binary
        run: |
          cargo build --release --locked -p sharpebench --target x86_64-unknown-linux-musl \
            || cargo build --release -p sharpebench --target x86_64-unknown-linux-musl

      - name: Checksum
        run: |
          cd target/x86_64-unknown-linux-musl/release
          sha256sum sharpebench > sharpebench-x86_64-linux-musl.sha256
          cp sharpebench sharpebench-x86_64-linux-musl

      - name: Attach to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-unknown-linux-musl/release/sharpebench-x86_64-linux-musl
            target/x86_64-unknown-linux-musl/release/sharpebench-x86_64-linux-musl.sha256

  publish-check:
    name: crates.io publish dry-run (kernel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify the scoring kernel packages cleanly
        run: cargo package -p sharpebench-core --locked || cargo package -p sharpebench-core
