# SharpeBench release pipeline (cargo-release). See docs/PUBLISHING.md §5.
#
# One command cuts a full release: bump the shared workspace version, rewrite the
# inter-crate `version = "x"` pins and the npm manifests, tag `vX.Y.Z`, and push the
# commit + tag. Publishing itself happens in .github/workflows/release.yml, which the
# tag triggers: crates.io over OIDC, npm, and the signed binary.
#
# Always run the green checks first — cargo-release will not:
#   cargo test --workspace && cargo clippy --workspace --all-targets && cargo deny check
#
# Then:
#   cargo release patch              # DRY RUN — prints exactly what would happen
#   cargo release patch --execute    # 0.0.1 -> 0.0.2: bump, dep-rewrite, ordered publish, tag, push
#
# Do NOT release until all tier work is in. The version stays 0.0.1 on git until then.

# Every sharpebench-* crate moves on a single version (matches `version.workspace = true`).
shared-version = true

# One release commit and one tag for the whole workspace, not one per crate.
consolidate-commits = true

# Rewrite each dependent crate's `version = "x"` requirement to the new version on
# bump. This automates the one manual gotcha (those pins are NOT workspace-inherited).
dependent-version = "upgrade"

# A single workspace tag `vX.Y.Z` — this is what release.yml builds the binary on.
tag-name = "v{{version}}"
tag-message = "SharpeBench v{{version}}"
pre-release-commit-message = "release: v{{version}}"

# These crates are set to Trusted-Publishing-only on crates.io, so a token upload from
# a laptop is refused with 403 and the local machine cannot publish at all. Cutting a
# release therefore only bumps, rewrites, commits, tags and pushes; the `v*` tag is what
# makes CI publish over OIDC (see .github/workflows/release.yml).
publish = false
push = true

# Guard rail: only ever release from main.
allow-branch = ["main"]

# The npm manifests are NOT workspace-inherited, so nothing used to rewrite them: the
# release job read the version out of package.json, found it already on the registry, and
# "skipped" — a green run that published nothing. That is how npm stalled at 0.0.10 while
# the crates went to 0.0.11. They are rewritten from the workspace version now, but the
# rules live in crates/sharpebench-cli/release.toml because cargo-release resolves
# `file` relative to each crate, not to the workspace root.
